<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Access Real Estate — District Intelligence Dashboard</title>
<style>
/* ===== Access Real Estate — District Intelligence Dashboard ===== */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg: #FFFFFF;
  --card: #F8F8F8;
  --card-2: #F1F1F1;
  --line: #E5E5E5;
  --line-strong: #D6D6D6;
  --accent: #8B1C43;
  --accent-dim: rgba(139,28,67,0.12);
  --accent-2: #B48A2E;
  --map-fill: #8B1C43;
  --map-empty: #CFD1D2;
  --warn: #C23B3B;
  --info: #2F6FED;
  --text: #2D2D2D;
  --text-2: #6B6B6B;
  --text-3: #9A9A9A;
  --radius: 16px;
  --radius-sm: 10px;
  --split: 42%;
  --shadow: 0 20px 50px -20px rgba(30,10,18,0.14);
}

*{ box-sizing: border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(139,28,67,0.06), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(180,138,46,0.05), transparent 55%),
    var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
::selection{ background: var(--accent); color: #FFFFFF; }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background: rgba(139,28,67,0.22); border-radius:8px; }
::-webkit-scrollbar-thumb:hover{ background: rgba(139,28,67,0.38); }

/* Number input spin buttons: keep the native grey up/down arrows, drop the light box behind them */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{
  opacity: 1;
  background: transparent;
  cursor: pointer;
}
input[type="number"]{
  color-scheme: light;
}

.app{ height:100vh; display:flex; flex-direction:column; }

/* ---------- Topbar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(14px);
  flex: 0 0 auto;
  z-index: 20;
}
.brand{ display:flex; align-items:center; gap:14px; }
.logo-box{
  width:92px; height: 46.5px;
  min-width: 92px;
  border-radius: 6px;
  background: transparent;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces', serif; font-weight:600; font-size: 15px; letter-spacing:0.5px;
  color: var(--text);
  background-size: contain; background-repeat:no-repeat; background-position:center;
  overflow:hidden;
  padding: 0;
}
.logo-img{ width:100%; height:100%; object-fit:contain; display:block; }
.brand-text{ display:flex; flex-direction:column; line-height:1.15; }
.brand-name{ font-family:'Fraunces', serif; font-weight:600; font-size:16.5px; letter-spacing:2.5px; }
.brand-sub{ font-size:9.5px; letter-spacing:3px; color: var(--text-2); text-transform:uppercase; margin-top:2px; }

.tabs{ display:flex; gap:4px; background: var(--card-2); padding:4px; border-radius: 999px; border:1px solid var(--line); flex:0 0 auto; }
.tab{
  border:none; background:transparent; color: var(--text-2);
  padding: 8px 20px; border-radius:999px; font-family:'Inter'; font-size:13px; font-weight:600;
  letter-spacing:0.3px; cursor:pointer; transition: all .25s ease;
}
.tab.active{ background: var(--accent); color:#FFFFFF; box-shadow: 0 4px 14px -4px rgba(139,28,67,0.5); }
.tab:not(.active):hover{ color: var(--text); }

.global-search{
  position:relative; flex:1 1 200px; min-width:150px; max-width:380px;
}
.global-search input{
  width:100%; background: var(--card-2); border:1px solid var(--line-strong); border-radius:999px;
  color: var(--text); font-family:'Inter'; font-size:13px; padding:9px 16px; transition: border-color .15s;
}
.global-search input::placeholder{ color: var(--text-3); }
.global-search input:focus{ outline:none; border-color: var(--accent); }
.search-results{
  position:absolute; top:calc(100% + 8px); left:0; right:0; max-height:340px; overflow-y:auto;
  background: var(--card); border:1px solid var(--line-strong); border-radius:14px; padding:6px;
  box-shadow: 0 16px 40px -12px rgba(30,10,18,0.25); display:none; z-index:150;
}
.search-results.open{ display:block; }
.search-result-item{
  display:flex; align-items:center; gap:10px; width:100%; background:none; border:none; color: var(--text);
  padding:9px 11px; border-radius:9px; cursor:pointer; text-align:left; font-family:'Inter'; font-size:13px;
}
.search-result-item:hover{ background: rgba(139,28,67,0.07); }
.sr-dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; box-shadow: 0 0 6px currentColor; }
.sr-text{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:1px; }
.sr-primary{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; color: var(--text); }
.sr-secondary{ font-size:10.5px; color: var(--text-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.search-empty{ padding:16px; text-align:center; color: var(--text-3); font-size:12.5px; font-style:italic; }
body.presentation .global-search{ display:none; }

.actions{ display:flex; align-items:center; gap:10px; }
.btn{
  display:inline-flex; align-items:center; gap:8px;
  background: var(--card); color: var(--text); border:1px solid var(--line-strong);
  padding: 9px 16px; border-radius: 10px; font-family:'Inter'; font-size:12.5px; font-weight:600;
  cursor:pointer; transition: all .2s ease; white-space:nowrap;
}
.btn:hover{ border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.btn.primary{ background: var(--accent); color:#FFFFFF; border-color:transparent; }
.btn.primary:hover{ filter:brightness(1.1); color:#FFFFFF; }
.btn.ghost{ background:transparent; }
.btn.small{ padding:6px 11px; font-size:11.5px; }
.btn.icon{ padding:8px; }
.btn:disabled{ opacity:.35; cursor:not-allowed; transform:none; }

.save-status{
  font-size:11px; font-weight:600; letter-spacing:.2px; white-space:nowrap; padding:6px 10px;
  border-radius:999px; display:none;
}
.save-status.ok{ display:inline-flex; color: var(--text-3); background: rgba(30,10,18,0.05); }
.save-status.warn{ display:inline-flex; color: var(--warn); background: rgba(194,59,59,0.12); border:1px solid rgba(194,59,59,0.3); }
body.presentation .save-status{ display:none !important; }

/* ---------- Views ---------- */
.view{ flex:1 1 auto; min-height:0; }
.view.hidden{ display:none; }

/* ---------- Dashboard: two maps side by side ---------- */
.maps-grid{ height:100%; display:flex; gap:18px; padding: 18px 24px 26px; }
.map-card{
  flex: 1 1 50%; min-width: 280px; display:flex; flex-direction:column;
  background: var(--card); border:1px solid var(--line); border-radius: var(--radius); overflow:hidden;
}
.map-card-title{
  display:flex; align-items:center; gap:10px;
  padding: 14px 18px; border-bottom:1px solid var(--line);
  font-family:'Fraunces', serif; font-weight:500; font-size:15px; letter-spacing:.3px;
  flex: 0 0 auto;
}
.map-card-title::before{ content:''; width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
#existingStockMapCard .map-card-title::before{ background: var(--accent); }
#newStockMapCard .map-card-title::before{ background: var(--accent-2); }
@media (max-width: 860px){
  .maps-grid{ flex-direction:column; }
}

/* ---------- Map card body: map + its own stock summary, side by side ---------- */
.map-card-body{ flex: 1 1 auto; min-height:0; display:flex; gap:0; }
.map-card-body .map-wrap{ flex: 1 1 68%; }
.stock-summary-card{
  flex: 1 1 32%; min-width: 150px; max-width: 210px;
  display:flex; flex-direction:column; gap:6px;
  margin: 12px 12px 12px 0; padding: 12px 12px 10px;
  background: var(--bg); border:1px solid var(--line); border-radius: var(--radius-sm);
  box-shadow: 0 8px 18px -14px rgba(30,10,18,0.18);
}
.stock-summary-title{
  font-family:'Fraunces', serif; font-weight:500; font-size:11.5px; letter-spacing:.2px;
  color: var(--text); padding-bottom:6px; border-bottom:1px solid var(--line);
}
.stock-summary-list{
  display:flex; flex-direction:column; gap:1px; max-height:180px; overflow-y:auto;
}
.stock-summary-row{
  display:flex; align-items:baseline; gap:6px; padding:4px 0; border-bottom:1px dashed var(--line);
}
.stock-summary-row:last-child{ border-bottom:none; }
.stock-summary-name{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:1px; }
.stock-summary-project{
  font-size:11px; color: var(--text); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.stock-summary-district{
  font-size:9.5px; color: var(--text-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.stock-summary-value{
  flex:0 0 auto; font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600;
  color: var(--text); text-align:right; min-width:26px;
}
.stock-summary-empty{ color: var(--text-3); font-size:11px; font-style:italic; padding: 4px 0; }
.stock-summary-total-row{
  display:flex; align-items:baseline; justify-content:space-between; gap:6px;
  border-top: 3px double var(--text-2); padding-top:7px; margin-top:1px;
}
.stock-summary-total-label{
  font-family:'Fraunces', serif; font-weight:600; font-size:12px; letter-spacing:.3px; color: var(--text);
}
.stock-summary-total-value{
  font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:15px; color: #8B1C43;
}
@media (max-width: 1100px){
  .map-card-body{ flex-direction:column; }
  .stock-summary-card{ max-width:none; margin: 0 12px 12px; }
}

/* ---------- Map ---------- */
.district-map{ width:100%; height:100%; max-height:100%; }
.map-wrap{
  flex: 1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center;
  padding: 14px; position:relative;
}
.district-path{
  stroke: var(--bg); stroke-width:1.1; cursor:pointer;
  transform-box: fill-box; transform-origin: center;
  transition: opacity .35s ease, filter .35s ease, transform .35s cubic-bezier(.2,.8,.3,1), stroke-width .25s ease;
}
.district-path:hover{ filter: brightness(1.15) drop-shadow(0 0 8px currentColor); }
.district-path.selected{ stroke: var(--text); stroke-width:2.2; filter: brightness(1.08) drop-shadow(0 0 10px currentColor); }
.map-caption{
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  font-size:10.5px; color: var(--text-3); letter-spacing:1.5px; text-transform:uppercase;
  pointer-events:none;
}

/* ---------- District modal content ---------- */
.district-header{ display:flex; align-items:center; gap:16px; margin-bottom: 22px; }
.locator-wrap{ width:64px; height:64px; flex:0 0 auto; }
.locator-map{ width:100%; height:100%; }
.locator-map .locator-selected{ stroke:#4A0F26; stroke-width:1; }
.district-header-text{ min-width:0; }
.district-header h2{ font-family:'Fraunces', serif; font-weight:500; font-size: 28px; margin:0; }
.district-sub{ color: var(--text-2); font-size:12.5px; letter-spacing:.5px; margin-top:2px; }

.section-card{
  background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
  margin-bottom: 20px;
}
.section-title{
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px 14px;
  padding: 14px 18px; border-bottom:1px solid var(--line);
  font-family:'Fraunces', serif; font-size:15px; letter-spacing:.3px; font-weight:500;
}
.section-title .title-actions{ display:flex; gap:8px; margin-left:auto; }
.section-title .count{ color: var(--text-3); font-family:'Inter'; font-size:11.5px; font-weight:600; margin-left:8px; }
.section-body{ padding: 14px 18px 18px; }

/* Table */
.table-scroll{ overflow-x:auto; }

.icon-btn{ background:none; border:none; color:var(--text-3); cursor:pointer; padding:3px 5px; font-size:12px; border-radius:5px; }
.icon-btn:hover{ color:var(--text); background: rgba(30,10,18,0.06); }
.icon-btn.danger:hover{ color: var(--warn); }
.empty-hint{ color: var(--text-3); font-size:12.5px; font-style:italic; padding: 6px 0; }

/* Projects */
table.proj-table{ border-collapse:collapse; width:100%; min-width: 480px; }
table.proj-table th{
  text-align:left; color: var(--text-2); font-weight:600; font-size:10.5px; letter-spacing:1px;
  text-transform:uppercase; padding: 8px 10px; border-bottom:1px solid var(--line); white-space:nowrap;
}
table.proj-table th.fixed-col{ min-width:150px; }
table.proj-table th.actions-col{ width:36px; }
table.proj-table td{ padding: 8px 10px; border-bottom:1px solid var(--line); vertical-align:middle; }
table.proj-table tr:last-child td{ border-bottom:none; }
table.proj-table input.proj-name{
  background:transparent; border:none; color:var(--text); font-family:'Inter'; font-size:13.5px; width:100%;
  padding:4px 2px; border-bottom:1px dashed transparent;
}
table.proj-table input.proj-name:focus{ outline:none; border-bottom:1px dashed var(--accent); }
table.proj-table input.proj-stock{
  background:transparent; border:none; color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:13px;
  width:100%; min-width:80px; padding:4px 2px; border-bottom:1px dashed transparent;
}
table.proj-table input.proj-stock:focus{ outline:none; border-bottom:1px dashed var(--accent); }
table.proj-table input.proj-newstock{
  background:transparent; border:none; color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:13px;
  width:100%; min-width:80px; padding:4px 2px; border-bottom:1px dashed transparent;
}
table.proj-table input.proj-newstock:focus{ outline:none; border-bottom:1px dashed var(--accent); }
table.proj-table input.proj-manager{
  background:transparent; border:none; color:var(--text-2); font-family:'Inter'; font-size:13px; width:100%;
  padding:4px 2px; border-bottom:1px dashed transparent; min-width:100px;
}
table.proj-table input.proj-manager:focus{ outline:none; border-bottom:1px dashed var(--accent); }
table.proj-table input.proj-profit{
  background:transparent; border:none; color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:13px;
  width:100%; min-width:90px; padding:4px 2px; border-bottom:1px dashed transparent;
}
table.proj-table input.proj-profit:focus{ outline:none; border-bottom:1px dashed var(--accent); }

.status-dropdown{ position:relative; width:fit-content; }
.status-trigger{
  display:flex; align-items:center; gap:9px; background: var(--card-2); border:1px solid var(--line-strong);
  border-radius:8px; padding:7px 12px; cursor:pointer; min-width:132px; font-family:'Inter'; color:var(--text);
  transition: border-color .15s;
}
.status-trigger:hover{ border-color: rgba(181,189,201,0.4); }
.status-dropdown.open .status-trigger{ border-color: var(--accent); }
.status-dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; box-shadow: 0 0 8px currentColor; }
.status-label{ font-size:13px; font-weight:500; flex:1 1 auto; text-align:left; }
.status-chev{ font-size:9px; color:var(--text-3); transition: transform .15s; }
.status-dropdown.open .status-chev{ transform: rotate(180deg); }
.status-menu{
  position:absolute; top:calc(100% + 6px); left:0; min-width:160px; z-index:40;
  background: var(--card); border:1px solid var(--line-strong); border-radius:10px; padding:6px;
  box-shadow: 0 16px 40px -12px rgba(30,10,18,0.25); display:none; flex-direction:column; gap:2px;
}
.status-dropdown.open .status-menu{ display:flex; }
.status-option{
  display:flex; align-items:center; gap:9px; background:none; border:none; color:var(--text);
  font-family:'Inter'; font-size:13px; font-weight:500; padding:8px 10px; border-radius:6px; cursor:pointer;
  text-align:left; width:100%;
}
.status-option:hover{ background: rgba(30,10,18,0.06); }
.status-option.selected{ background: rgba(30,10,18,0.045); }
.status-option.selected::after{ content:'\2713'; margin-left:auto; color: var(--accent); font-size:12px; }
.proj-row-actions{ text-align:right; white-space:nowrap; }
.proj-row-actions .icon-btn{ margin-left:2px; }

/* ---------- Performance view ---------- */
.perf-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:22px; align-items:start; }
.perf-chart-body{ display:flex; align-items:flex-start; gap:22px; flex-wrap:wrap; }
.perf-hint{ padding-top:0; color: var(--text-3); font-size:12px; }
.pie-wrap{ position:relative; width:200px; height:200px; flex:0 0 auto; }
.pie-svg{ width:100%; height:100%; transform: rotate(0deg); }
.pie-slice{ stroke: var(--card); stroke-width:1.5; transition: filter .15s ease, transform .15s ease; transform-box: fill-box; transform-origin: center; cursor:default; }
.pie-slice:hover{ filter: brightness(1.18); transform: scale(1.03); }
.donut-center{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none; text-align:center;
}
.donut-total{ font-family:'Fraunces', serif; font-size:22px; font-weight:600; color:var(--text); line-height:1.1; }
.donut-sub{ font-size:9.5px; letter-spacing:1.2px; text-transform:uppercase; color: var(--text-3); margin-top:4px; }
.pie-empty{
  width:200px; height:200px; display:flex; align-items:center; justify-content:center; text-align:center;
  color: var(--text-3); font-size:12.5px; font-style:italic; border:1px dashed var(--line-strong); border-radius:50%;
  padding: 20px;
}
.perf-legend{
  flex:1 1 220px; min-width:220px; max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:2px;
}
.legend-row{ display:flex; align-items:center; gap:9px; padding:6px 4px; border-radius:6px; }
.legend-row:hover{ background: rgba(30,10,18,0.045); }
.legend-row .dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
.legend-name{ flex:1 1 auto; min-width:0; font-size:12.5px; color: var(--text-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.legend-manager{ flex:0 0 auto; max-width:88px; font-size:11px; color: var(--text-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.legend-value{ flex:0 0 auto; font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--text); min-width:24px; text-align:right; }
.legend-input{
  flex:0 0 auto; width:84px; background: var(--card-2); border:1px solid var(--line-strong); border-radius:6px;
  color: var(--text); font-family:'IBM Plex Mono', monospace; font-size:12px; padding:4px 8px; text-align:right;
}
.legend-input:focus{ outline:none; border-color: var(--accent); }
.legend-pct{ flex:0 0 auto; width:34px; text-align:right; font-size:11px; color: var(--text-3); }

@media (max-width: 760px){
  .perf-grid{ grid-template-columns: 1fr; }
}

/* ---------- Performance wrap (also reused as generic full-width scroll wrap) ---------- */
.editor-wrap{ height:100%; overflow-y:auto; padding: 26px 30px 60px; display:grid; grid-template-columns: 1fr; gap:22px; max-width:1180px; margin:0 auto; }

/* ---------- District detail popup ---------- */
.district-modal-overlay{
  position:fixed; inset:0; background: rgba(4,7,11,0.72); backdrop-filter: blur(4px);
  display:none; align-items:flex-start; justify-content:center; z-index:200; padding:48px 20px;
  overflow-y:auto; animation: overlayFade .18s ease;
}
.district-modal-overlay.open{ display:flex; }
@keyframes overlayFade{ from{ opacity:0; } to{ opacity:1; } }
.district-modal-card{
  background: var(--card); border:1px solid var(--line-strong); border-radius: var(--radius);
  padding: 30px 30px 34px; width:100%; max-width:760px; box-shadow: var(--shadow); position:relative;
  animation: panelFade .25s ease both;
}
.modal-close-btn{
  position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-3);
  font-size:22px; line-height:1; cursor:pointer; padding:4px 10px; border-radius:8px; transition: all .15s;
}
.modal-close-btn:hover{ color:var(--text); background: rgba(30,10,18,0.07); }
.stock-stats-row{ display:flex; gap:14px; margin: 4px 0 22px; flex-wrap:wrap; }
.stock-stat{
  flex:1 1 150px; background: var(--card-2); border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 14px 16px;
}
.stock-stat-label{ font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-3); margin-bottom:6px; }
.stock-stat-value{ font-family:'Fraunces', serif; font-size:26px; font-weight:600; color:var(--text); line-height:1.1; }

/* ---------- District popup: large preview + configurable field list ---------- */
.district-popup-layout{ display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap; }
.district-preview-wrap{
  flex:0 0 200px; width:200px; height:200px; display:flex; align-items:center; justify-content:center;
  background:transparent; margin:0 auto;
}
.district-preview-svg{
  width:100%; height:100%; opacity:0; transform:scale(.92);
  animation: previewFadeIn .5s cubic-bezier(.2,.8,.3,1) .05s forwards;
  filter: drop-shadow(0 10px 24px rgba(139,28,67,0.22));
}
@keyframes previewFadeIn{ from{ opacity:0; transform:scale(.92); } to{ opacity:1; transform:scale(1); } }
.district-popup-panel{ flex:1 1 300px; min-width:240px; }
.popup-empty-hint{
  color: var(--text-3); font-size:12.5px; font-style:italic; margin: 2px 0 14px;
}
.popup-fields{ display:flex; flex-direction:column; gap:14px; }
.popup-field-row{ display:flex; flex-direction:column; gap:6px; }
.popup-field-label{
  font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-3); font-weight:600;
}
.popup-field-control input.popup-field-input,
.popup-field-control textarea.popup-field-input{
  width:100%; background: var(--card-2); border:1px solid var(--line); border-radius: var(--radius-sm);
  color: var(--text); font-family:'Inter'; font-size:14px; padding:9px 12px; transition: border-color .15s;
}
.popup-field-control textarea.popup-field-input{ resize: vertical; min-height:44px; font-family:'Inter'; }
.popup-field-control input.popup-field-input:focus,
.popup-field-control textarea.popup-field-input:focus{ outline:none; border-color: var(--accent); }
.popup-field-control .status-dropdown{ width:100%; }
.popup-field-control .status-trigger{ width:100%; }
@media (max-width: 560px){
  .district-preview-wrap{ flex-basis:100%; width:160px; height:160px; }
}

/* ---------- Project tile grid (shown after clicking a district) ---------- */
.tile-toolbar{
  display:flex; align-items:center; justify-content:space-between; gap:12px; margin: 2px 0 14px;
}
.tile-toolbar .count{ color: var(--text-3); font-size:12px; font-weight:600; }
.project-tiles{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:14px;
}
.project-tile{
  position:relative; text-align:left; cursor:pointer; background: var(--card-2);
  border:1px solid var(--line); border-radius: var(--radius-sm); padding: 16px 16px 14px;
  transition: transform .18s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease, border-color .2s ease;
  display:flex; flex-direction:column; gap:8px;
}
.project-tile:hover{
  transform: translateY(-3px); box-shadow: 0 14px 28px -14px rgba(30,10,18,0.28); border-color: var(--line-strong);
}
.project-tile:focus-visible{ outline: 2px solid var(--accent); outline-offset:2px; }
.project-tile.selected{ border-color: #8B1C43; box-shadow: 0 0 0 1.5px #8B1C43, 0 14px 28px -14px rgba(139,28,67,0.35); }
.project-tile-name{
  font-family:'Fraunces', serif; font-weight:500; font-size:15.5px; color: var(--text); line-height:1.25;
  padding-right:20px;
}
.project-tile-stock{ font-size:12.5px; color: var(--text-2); }
.project-tile-stock strong{ color: var(--text); font-family:'IBM Plex Mono', monospace; font-weight:600; }
.project-tile-status{ display:flex; align-items:center; gap:7px; font-size:12px; color: var(--text-2); font-weight:500; margin-top:2px; }
.project-tile-delete{
  position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:6px;
  background:none; border:none; color: var(--text-3); font-size:16px; line-height:1; cursor:pointer;
  opacity:0; transition: opacity .15s, background .15s, color .15s;
}
.project-tile:hover .project-tile-delete,
.project-tile:focus-within .project-tile-delete{ opacity:1; }
.project-tile-delete:hover{ background: rgba(194,59,59,0.12); color: var(--warn); }

/* ---------- Project detail popup extras ---------- */
.back-to-tiles-btn{
  display:inline-flex; align-items:center; gap:6px; background:none; border:none; color: var(--text-2);
  font-family:'Inter'; font-size:12.5px; font-weight:600; cursor:pointer; padding:4px 2px; margin-bottom:16px;
  transition: color .15s;
}
.back-to-tiles-btn:hover{ color: var(--accent); }
.project-name-input{
  width:100%; background:transparent; border:none; border-bottom:1px dashed transparent;
  font-family:'Fraunces', serif; font-weight:500; font-size:26px; color: var(--text); padding:2px 0 4px;
  transition: border-color .15s;
}
.project-name-input:hover{ border-bottom-color: var(--line-strong); }
.project-name-input:focus{ outline:none; border-bottom-color: var(--accent); }

/* ---------- Presentation / fullscreen mode ---------- */
body.presentation .topbar{ padding: 10px 24px; }
body:fullscreen{ background: var(--bg); }
body.presentation .map-card-title{ font-size:17px; padding:16px 22px; }
body.presentation .district-header h2{ font-size:38px; }
body.presentation .section-title{ font-size:18px; padding:16px 22px; }
body.presentation .proj-table th{ font-size:12px; }
body.presentation .proj-name{ font-size:16px; }
body.presentation .status-label{ font-size:14px; }
body.presentation .brand-name{ font-size:19px; }
body.presentation .map-caption{ font-size:12px; }

/* ---------- Fade / entrance ---------- */
.view{ animation: viewFade .4s ease; }
@keyframes viewFade{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none;} }

@keyframes panelFade{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none;} }

@media (max-width: 860px){
  .brand-sub{ display:none; }
  .topbar{ flex-wrap:wrap; }
  .global-search{ order:5; flex-basis:100%; max-width:none; }
}

</style>
</head>

<script>
/* ===== Access Real Estate — District Intelligence Dashboard : app logic ===== */
(function(){
"use strict";

const DISTRICT_NAMES = Object.keys(GEO.paths);

const STATUS_META = {
  green:  { color: "#00C896", label: "Green", priority: 0 },
  orange: { color: "#FF9F1C", label: "Orange", priority: 1 },
  red:    { color: "#FF5C5C", label: "Red", priority: 2 },
  blue:   { color: "#3B82F6", label: "Blue", priority: 3 },
};

/* ---- Custom status dropdown (native <select> can't show colored options) ---- */
function statusDropdownHtml(status){
  const opts = Object.keys(STATUS_META).map(k => `
    <button type="button" class="status-option${k===status?' selected':''}" data-status="${k}">
      <span class="status-dot" style="background:${STATUS_META[k].color};color:${STATUS_META[k].color}"></span>${STATUS_META[k].label}
    </button>`).join("");
  return `
    <div class="status-dropdown">
      <button type="button" class="status-trigger">
        <span class="status-dot" style="background:${STATUS_META[status].color};color:${STATUS_META[status].color}"></span>
        <span class="status-label">${STATUS_META[status].label}</span>
        <span class="status-chev">\u25be</span>
      </button>
      <div class="status-menu">${opts}</div>
    </div>`;
}
function wireStatusDropdown(rootEl, onPick){
  const dd = rootEl.querySelector(".status-dropdown");
  if(!dd) return;
  const trigger = dd.querySelector(".status-trigger");
  trigger.addEventListener("click", e => {
    e.stopPropagation();
    const willOpen = !dd.classList.contains("open");
    closeAllStatusDropdowns();
    if(willOpen) dd.classList.add("open");
  });
  dd.querySelectorAll(".status-option").forEach(opt => {
    opt.addEventListener("click", e => {
      e.stopPropagation();
      dd.classList.remove("open");
      onPick(opt.dataset.status);
    });
  });
}
function closeAllStatusDropdowns(){
  $$(".status-dropdown.open").forEach(d => d.classList.remove("open"));
}

/* ====================================================================
   FIELD / COLUMN CONFIGURATION
   ----------------------------------------------------------------
   Single place to add, remove, rename, or reorder the columns shown
   inside a project's detail popup.

   FIELD_REGISTRY defines every field that can ever appear: its label
   and its input type. To add a brand-new column, add one entry here,
   then reference its key inside the relevant map's `fields` array.

   MAP_CONFIG defines, per map ("existing" / "new"), which field holds
   that map's stock number (valueField) and which fields show in a
   project's popup and in what order (fields) — edit these arrays to
   change columns for that map. Nothing else needs to change.
   ==================================================================== */
const FIELD_REGISTRY = {
  existingStock: { label: "Existing Stock", type: "number" },
  newStock:      { label: "New Stock",      type: "number" },
  notes:         { label: "Notes",          type: "text"   },
  status:        { label: "Status",         type: "status" },
  lastUpdated:   { label: "Last Updated",   type: "date"   },
};

const MAP_CONFIG = {
  existing: {
    key: "existing",
    title: "Existing Stock",
    accentVar: "--accent",
    valueField: "existingStock",
    fields: ["existingStock", "notes", "status", "lastUpdated"],
  },
  new: {
    key: "new",
    title: "New Stock",
    accentVar: "--accent-2",
    valueField: "newStock",
    fields: ["newStock", "notes", "status", "lastUpdated"],
  },
};

function uid(){ return Math.random().toString(36).slice(2,9); }

/* Each district holds an ARRAY of project records for a given map.
   A fresh project starts with that map's own value field at 0. */
function defaultProjectRecord(mapKey){
  const rec = { id: uid(), projectName: "Untitled Project", notes: "", status: "blue", lastUpdated: "" };
  rec[MAP_CONFIG[mapKey].valueField] = 0;
  return rec;
}

function storageAvailable(){
  try{
    const testKey = "__storage_test__";
    localStorage.setItem(testKey, "1");
    localStorage.removeItem(testKey);
    return true;
  } catch(e){
    return false;
  }
}
let STORAGE_OK = true;
const STORAGE_KEY = "accessRealEstateDashboard_v3";

/* ---------------- Persistence (localStorage) ----------------
   Works once this file is served over http(s) — GitHub Pages, any real web
   host, or a local dev server. Opening the file directly by double-clicking
   it (a file:// URL) makes some browsers, especially Chrome, block storage
   entirely — that's the #1 cause of "it doesn't save." Claude.ai's artifact
   preview sandbox blocks storage too, for the same category of reason.

   existingStockData and newStockData are saved and restored as two fully
   separate arrays-of-projects per district — this is what keeps the two
   maps' data independent even across reloads. */
function saveState(){
  if(!STORAGE_OK) return;
  try{
    const payload = {
      districtLabels: state.districtLabels,
      existingStockData: state.existingStockData,
      newStockData: state.newStockData,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch(e){
    STORAGE_OK = false;
    setSaveIndicator("blocked");
  }
}
function setSaveIndicator(kind){
  const el = document.getElementById("saveStatus");
  if(!el) return;
  if(kind === "ok"){
    el.textContent = "\u25cf Autosaving to this browser";
    el.className = "save-status ok";
  } else {
    el.textContent = "\u26a0 Not saving \u2014 open this page from its real web address, not a downloaded file";
    el.className = "save-status warn";
  }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(parsed.districtLabels) Object.assign(state.districtLabels, parsed.districtLabels);
    if(parsed.existingStockData){
      DISTRICT_NAMES.forEach(name => {
        if(Array.isArray(parsed.existingStockData[name])) state.existingStockData[name] = parsed.existingStockData[name];
      });
    }
    if(parsed.newStockData){
      DISTRICT_NAMES.forEach(name => {
        if(Array.isArray(parsed.newStockData[name])) state.newStockData[name] = parsed.newStockData[name];
      });
    }
  } catch(e){ /* corrupted or unavailable storage — start fresh */ }
}

/* ---------------- State ----------------
   existingStockData and newStockData are two completely separate objects,
   each mapping district name -> an ARRAY of project records. Editing a
   project (or the array) in one map NEVER touches the other map's data. */
const state = {
  activeTab: "dashboard",
  openDistrict: null,   // { name, mapKey } while the tile grid or a project popup is open
  openProjectId: null,  // project id while the detail popup (rather than the tile grid) is open
  districtLabels: {},
  existingStockData: {},
  newStockData: {},
};

DISTRICT_NAMES.forEach(name => {
  state.districtLabels[name] = name;
  state.existingStockData[name] = [];
  state.newStockData[name] = [];
});

/* ---------------- DOM refs ---------------- */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

const existingStockMapSvg = $("#existingStockMap");
const newStockMapSvg = $("#newStockMap");

function datasetFor(mapKey){
  return mapKey === "existing" ? state.existingStockData : state.newStockData;
}
function findProject(name, mapKey, projectId){
  return datasetFor(mapKey)[name].find(p => p.id === projectId);
}

/* ---------------- Map rendering ---------------- */
/* A district is only ever "active" (#8B1C43) on a given map when at least
   one of its projects on THAT map has a stock value > 0. Each map reads
   exclusively from its own dataset, so the two maps can never influence
   each other's colors. */
function districtHasData(name, mapKey){
  const field = MAP_CONFIG[mapKey].valueField;
  return datasetFor(mapKey)[name].some(p => (p[field] || 0) > 0);
}
function districtFill(name, mapKey){
  return districtHasData(name, mapKey) ? "#8B1C43" : "#CFD1D2";
}
function paintMap(svgEl, mapKey){
  svgEl.setAttribute("viewBox", `0 0 ${GEO.width} ${GEO.height}`);
  svgEl.innerHTML = "";
  DISTRICT_NAMES.forEach(name => {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", GEO.paths[name]);
    path.setAttribute("class", "district-path");
    const fill = districtFill(name, mapKey);
    path.setAttribute("fill", fill);
    path.style.color = fill;
    path.dataset.name = name;
    if(state.openDistrict && state.openDistrict.name === name && state.openDistrict.mapKey === mapKey){
      path.classList.add("selected");
    }
    path.addEventListener("click", () => openDistrictTiles(name, mapKey));
    svgEl.appendChild(path);
  });
}
function renderMaps(){
  paintMap(existingStockMapSvg, "existing");
  paintMap(newStockMapSvg, "new");
  renderStockSummaries();
}

/* ---------------- Stock summary panels (beside each map) ----------------
   Each summary reads ONLY from its own map's dataset (existingStockData or
   newStockData) — never both — so the two panels stay fully independent,
   exactly like the two maps themselves. Called every time renderMaps() is
   called, so it stays in sync whenever a project is added, removed, or
   edited. */
function collectProjectsForSummary(mapKey){
  const dataset = datasetFor(mapKey);
  const field = MAP_CONFIG[mapKey].valueField;
  const items = [];
  DISTRICT_NAMES.forEach(name => {
    dataset[name].forEach(p => {
      items.push({
        projectName: p.projectName || "Untitled Project",
        district: state.districtLabels[name],
        value: p[field] || 0,
      });
    });
  });
  items.sort((a,b) => b.value - a.value || a.projectName.localeCompare(b.projectName));
  return items;
}
function renderStockSummary(mapKey){
  const listEl = $(mapKey === "existing" ? "#existingStockSummaryList" : "#newStockSummaryList");
  const totalEl = $(mapKey === "existing" ? "#existingStockSummaryTotal" : "#newStockSummaryTotal");
  if(!listEl || !totalEl) return;

  const items = collectProjectsForSummary(mapKey);
  const total = items.reduce((s,it) => s + it.value, 0);

  listEl.innerHTML = items.length === 0
    ? `<div class="stock-summary-empty">No projects yet.</div>`
    : items.map(it => `
      <div class="stock-summary-row">
        <span class="stock-summary-name">
          <span class="stock-summary-project">${escapeHtml(it.projectName)}</span>
          <span class="stock-summary-district">${escapeHtml(it.district)}</span>
        </span>
        <span class="stock-summary-value">${formatFullNum(it.value)}</span>
      </div>`).join("");

  totalEl.textContent = formatFullNum(total);
}
function renderStockSummaries(){
  renderStockSummary("existing");
  renderStockSummary("new");
}

/* Large single-district preview, cropped to that district's own bounds
   (not the whole island) so it renders big, centered, and clearly
   recognizable as that district's shape. */
function districtPreviewSvg(name){
  const b = GEO.bounds[name];
  const w = b[2] - b[0], h = b[3] - b[1];
  const pad = Math.max(w, h) * 0.14 + 2;
  const vb = `${b[0]-pad} ${b[1]-pad} ${w+pad*2} ${h+pad*2}`;
  return `<svg viewBox="${vb}" class="district-preview-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <path d="${GEO.paths[name]}" fill="#8B1C43"></path>
  </svg>`;
}

/* ---------------- Global search (districts + projects + notes, across both maps) ---------------- */
function runGlobalSearch(query){
  const q = query.trim().toLowerCase();
  const resultsEl = $("#searchResults");
  if(!resultsEl) return;
  if(!q){ resultsEl.innerHTML = ""; resultsEl.classList.remove("open"); return; }

  const results = [];
  DISTRICT_NAMES.forEach(name => {
    const label = state.districtLabels[name];
    const districtNameMatch = label.toLowerCase().includes(q);
    ["existing","new"].forEach(mapKey => {
      const cfg = MAP_CONFIG[mapKey];
      const arr = datasetFor(mapKey)[name];
      if(districtNameMatch){
        results.push({
          kind: "district", mapKey, districtKey: name,
          primary: label,
          secondary: `${cfg.title} \u00b7 ${arr.length} project${arr.length===1?"":"s"}`,
          active: districtHasData(name, mapKey),
        });
      }
      arr.forEach(p => {
        const pname = p.projectName || "Untitled Project";
        const pnameMatch = pname.toLowerCase().includes(q);
        const noteMatch = (p.notes || "").toLowerCase().includes(q);
        if(pnameMatch || noteMatch){
          results.push({
            kind: "project", mapKey, districtKey: name, projectId: p.id,
            primary: `${pname} \u2014 ${label}`,
            secondary: `${cfg.title}${noteMatch && !pnameMatch ? " \u2014 note match" : ""}`,
            active: (p[cfg.valueField] || 0) > 0,
          });
        }
      });
    });
  });

  renderSearchResults(results.slice(0, 30), q);
}
function renderSearchResults(results, q){
  const resultsEl = $("#searchResults");
  if(results.length === 0){
    resultsEl.innerHTML = `<div class="search-empty">No matches for \u201c${escapeHtml(q)}\u201d</div>`;
  } else {
    resultsEl.innerHTML = results.map((r, i) => {
      const dotColor = r.active ? "#8B1C43" : "#CFD1D2";
      return `
      <button type="button" class="search-result-item" data-idx="${i}">
        <span class="sr-dot" style="background:${dotColor};color:${dotColor}"></span>
        <span class="sr-text">
          <span class="sr-primary">${escapeHtml(r.primary)}</span>
          <span class="sr-secondary">${escapeHtml(r.secondary)}</span>
        </span>
      </button>`;
    }).join("");
    resultsEl.querySelectorAll(".search-result-item").forEach(item => {
      item.addEventListener("click", () => {
        const r = results[Number(item.dataset.idx)];
        if(state.activeTab !== "dashboard") setTab("dashboard");
        if(r.kind === "district") openDistrictTiles(r.districtKey, r.mapKey);
        else openProjectPopup(r.districtKey, r.mapKey, r.projectId);
        closeGlobalSearch();
      });
    });
  }
  resultsEl.classList.add("open");
}
function closeGlobalSearch(){
  const input = $("#globalSearch");
  const resultsEl = $("#searchResults");
  if(input) input.value = "";
  if(resultsEl){ resultsEl.innerHTML = ""; resultsEl.classList.remove("open"); }
}
function initGlobalSearch(){
  const input = $("#globalSearch");
  const wrap = $("#searchWrap");
  if(!input) return;
  input.addEventListener("input", () => runGlobalSearch(input.value));
  input.addEventListener("focus", () => { if(input.value.trim()) runGlobalSearch(input.value); });
  input.addEventListener("keydown", e => { if(e.key === "Escape"){ closeGlobalSearch(); input.blur(); } });
  document.addEventListener("click", e => { if(wrap && !wrap.contains(e.target)) closeGlobalSearch(); });
}

/* ====================================================================
   DISTRICT TILE GRID (step shown after clicking a district on the map)
   ==================================================================== */
function openDistrictTiles(name, mapKey){
  state.openDistrict = { name, mapKey };
  state.openProjectId = null;
  const overlay = $("#districtModalOverlay");
  const cfg = MAP_CONFIG[mapKey];
  overlay.innerHTML = `
    <div class="district-modal-card">
      <button class="modal-close-btn" id="districtModalClose" title="Close">&times;</button>
      <div class="district-popup-layout">
        <div class="district-preview-wrap">${districtPreviewSvg(name)}</div>
        <div class="district-popup-panel">
          <div class="district-header-text">
            <h2>${escapeHtml(state.districtLabels[name])}</h2>
            <div class="district-sub" style="color:var(${cfg.accentVar});">${escapeHtml(cfg.title)} \u00b7 Projects</div>
          </div>
          <div class="tile-toolbar">
            <span class="count" id="tileCount"></span>
            <button class="btn small primary" id="addProjectBtn">+ Add Project</button>
          </div>
          <div class="project-tiles" id="projectTiles"></div>
        </div>
      </div>
    </div>`;
  overlay.classList.add("open");
  renderMaps(); // repaint so the clicked district gets the "selected" highlight
  renderProjectTiles(name, mapKey);
  $("#districtModalClose").addEventListener("click", closeDistrictModal);
  $("#addProjectBtn").addEventListener("click", () => {
    datasetFor(mapKey)[name].push(defaultProjectRecord(mapKey));
    saveState();
    renderMaps();
    renderProjectTiles(name, mapKey);
  });
  overlay.addEventListener("click", e => { if(e.target === overlay) closeDistrictModal(); });
}
function renderProjectTiles(name, mapKey){
  const cfg = MAP_CONFIG[mapKey];
  const arr = datasetFor(mapKey)[name];
  const countEl = $("#tileCount");
  if(countEl) countEl.textContent = arr.length ? `${arr.length} project${arr.length===1?"":"s"}` : "";

  const wrap = $("#projectTiles");
  if(!wrap) return;
  if(arr.length === 0){
    wrap.innerHTML = `<div class="empty-hint">No projects yet for this district on the ${escapeHtml(cfg.title)} map. Click "+ Add Project" to create one.</div>`;
    return;
  }
  wrap.innerHTML = arr.map(p => {
    const value = p[cfg.valueField] || 0;
    const statusMeta = STATUS_META[p.status] || STATUS_META.blue;
    const isOpen = state.openProjectId === p.id;
    return `
    <div class="project-tile${isOpen ? " selected" : ""}" data-project-id="${p.id}" tabindex="0" role="button">
      <button type="button" class="project-tile-delete" data-delete-id="${p.id}" title="Remove project">&times;</button>
      <div class="project-tile-name">${escapeHtml(p.projectName || "Untitled Project")}</div>
      <div class="project-tile-stock">${escapeHtml(FIELD_REGISTRY[cfg.valueField].label)}: <strong>${formatFullNum(value)}</strong></div>
      <div class="project-tile-status"><span class="status-dot" style="background:${statusMeta.color};color:${statusMeta.color}"></span>${escapeHtml(statusMeta.label)}</div>
    </div>`;
  }).join("");

  wrap.querySelectorAll(".project-tile").forEach(tile => {
    const open = () => openProjectPopup(name, mapKey, tile.dataset.projectId);
    tile.addEventListener("click", e => { if(!e.target.closest(".project-tile-delete")) open(); });
    tile.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); open(); } });
  });
  wrap.querySelectorAll(".project-tile-delete").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const id = btn.dataset.deleteId;
      const list = datasetFor(mapKey)[name];
      const idx = list.findIndex(p => p.id === id);
      if(idx > -1) list.splice(idx, 1);
      saveState();
      renderMaps();
      renderProjectTiles(name, mapKey);
    });
  });
}

/* ====================================================================
   PROJECT DETAIL POPUP (step shown after clicking a project tile)
   ----------------------------------------------------------------
   The fields shown are built entirely from MAP_CONFIG / FIELD_REGISTRY
   above — nothing here is hardcoded per-map.
   ==================================================================== */
function fieldControlHtml(fieldKey, record){
  const def = FIELD_REGISTRY[fieldKey];
  const value = record[fieldKey];
  if(def.type === "number"){
    return `<input type="number" class="popup-field-input" data-field="${fieldKey}" min="0" step="1" value="${value ? value : ""}" placeholder="0"/>`;
  }
  if(def.type === "text"){
    return `<textarea class="popup-field-input popup-field-textarea" data-field="${fieldKey}" placeholder="Add a note\u2026" rows="2">${escapeHtml(value || "")}</textarea>`;
  }
  if(def.type === "date"){
    return `<input type="date" class="popup-field-input" data-field="${fieldKey}" value="${escapeAttr(value || "")}"/>`;
  }
  if(def.type === "status"){
    return statusDropdownHtml(value || "blue");
  }
  return "";
}

function openProjectPopup(name, mapKey, projectId){
  const record = findProject(name, mapKey, projectId);
  if(!record) return;
  state.openDistrict = { name, mapKey };
  state.openProjectId = projectId;
  const overlay = $("#districtModalOverlay");
  const cfg = MAP_CONFIG[mapKey];
  overlay.innerHTML = `
    <div class="district-modal-card">
      <button class="modal-close-btn" id="districtModalClose" title="Close">&times;</button>
      <button type="button" class="back-to-tiles-btn" id="backToTilesBtn">&larr; ${escapeHtml(state.districtLabels[name])} projects</button>
      <div class="district-popup-layout">
        <div class="district-preview-wrap">${districtPreviewSvg(name)}</div>
        <div class="district-popup-panel">
          <div class="district-header-text">
            <input type="text" class="project-name-input" id="projectNameInput" value="${escapeAttr(record.projectName || "")}" placeholder="Untitled Project"/>
            <div class="district-sub" style="color:var(${cfg.accentVar});">${escapeHtml(state.districtLabels[name])} \u00b7 ${escapeHtml(cfg.title)}</div>
          </div>
          <div class="popup-empty-hint" id="popupEmptyHint"></div>
          <div class="popup-fields" id="popupFields"></div>
        </div>
      </div>
    </div>`;
  overlay.classList.add("open");
  renderMaps();
  renderPopupFields(name, mapKey, projectId);
  $("#projectNameInput").addEventListener("change", e => {
    record.projectName = e.target.value;
    saveState();
    renderStockSummaries();
  });
  $("#districtModalClose").addEventListener("click", closeDistrictModal);
  $("#backToTilesBtn").addEventListener("click", () => openDistrictTiles(name, mapKey));
  overlay.addEventListener("click", e => { if(e.target === overlay) closeDistrictModal(); });
}
function closeDistrictModal(){
  const overlay = $("#districtModalOverlay");
  overlay.classList.remove("open");
  overlay.innerHTML = "";
  state.openDistrict = null;
  state.openProjectId = null;
  renderMaps();
}
function renderPopupFields(name, mapKey, projectId){
  const cfg = MAP_CONFIG[mapKey];
  const record = findProject(name, mapKey, projectId);
  if(!record) return;
  const hasData = (record[cfg.valueField] || 0) > 0;

  const hint = $("#popupEmptyHint");
  if(hint){
    hint.textContent = hasData ? "" : "No information available.";
    hint.style.display = hasData ? "none" : "block";
  }

  const wrap = $("#popupFields");
  if(!wrap) return;
  wrap.innerHTML = cfg.fields.map(key => {
    const def = FIELD_REGISTRY[key];
    return `<div class="popup-field-row" data-field-row="${key}">
      <div class="popup-field-label">${escapeHtml(def.label)}</div>
      <div class="popup-field-control">${fieldControlHtml(key, record)}</div>
    </div>`;
  }).join("");

  cfg.fields.forEach(key => {
    const def = FIELD_REGISTRY[key];
    const row = wrap.querySelector(`[data-field-row="${key}"]`);
    if(!row) return;
    if(def.type === "status"){
      wireStatusDropdown(row, val => {
        record[key] = val;
        saveState();
        renderPopupFields(name, mapKey, projectId);
      });
    } else {
      const input = row.querySelector(".popup-field-input");
      input.addEventListener("change", () => {
        if(def.type === "number") record[key] = Math.max(0, parseFloat(input.value) || 0);
        else record[key] = input.value;
        saveState();
        const affectsColor = def.type === "number" && key === cfg.valueField;
        if(affectsColor) renderMaps();
        renderPopupFields(name, mapKey, projectId);
      });
    }
  });
}

/* ---------------- Performance view (donut charts, per-map) ---------------- */
function polarPoint(cx, cy, r, angleDeg){
  const a = (angleDeg) * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}
function buildDonutSvg(items, size, sliceColor){
  const total = items.reduce((s,i) => s + i.value, 0);
  if(total <= 0) return null;
  const R = size / 2, r = R * 0.6, cx = R, cy = R;
  let angle = -90;
  const nonZero = items.filter(i => i.value > 0);
  const maxVal = Math.max(...nonZero.map(i => i.value));
  const slices = nonZero.map(item => {
    const frac = item.value / total;
    const sweep = Math.max(frac * 360, nonZero.length === 1 ? 359.999 : 0.4);
    const a0 = angle, a1 = angle + sweep;
    const largeArc = (a1 - a0) > 180 ? 1 : 0;
    const p0 = polarPoint(cx, cy, R, a0), p1 = polarPoint(cx, cy, R, a1);
    const p2 = polarPoint(cx, cy, r, a1), p3 = polarPoint(cx, cy, r, a0);
    const d = `M${p0.x.toFixed(2)},${p0.y.toFixed(2)} A${R},${R} 0 ${largeArc} 1 ${p1.x.toFixed(2)},${p1.y.toFixed(2)} L${p2.x.toFixed(2)},${p2.y.toFixed(2)} A${r},${r} 0 ${largeArc} 0 ${p3.x.toFixed(2)},${p3.y.toFixed(2)} Z`;
    angle = a1;
    const tooltip = `${item.label}: ${formatFullNum(item.value)}`;
    return `<path d="${d}" fill="${sliceColor}" fill-opacity="${0.55 + 0.45 * (item.value/maxVal)}" class="pie-slice"><title>${escapeHtml(tooltip)}</title></path>`;
  }).join("");
  return `<svg viewBox="0 0 ${size} ${size}" class="pie-svg">${slices}</svg>`;
}
function formatFullNum(n){
  try{ return new Intl.NumberFormat("en").format(n); }
  catch(e){ return String(n); }
}

function collectStockByDistrict(mapKey){
  const dataset = datasetFor(mapKey);
  const field = MAP_CONFIG[mapKey].valueField;
  return DISTRICT_NAMES
    .map(name => ({
      name,
      label: state.districtLabels[name],
      value: dataset[name].reduce((s,p) => s + (p[field] || 0), 0),
    }))
    .filter(it => it.value > 0)
    .sort((a,b) => b.value - a.value);
}

function renderPerformance(){
  const wrap = $("#performanceWrap");
  wrap.innerHTML = `
    <div class="perf-grid">
      <div class="section-card">
        <div class="section-title">Existing Stock by District <span class="count" id="existingStockTotal"></span></div>
        <div class="section-body perf-chart-body">
          <div class="pie-wrap" id="existingStockPieWrap"></div>
          <div class="perf-legend" id="existingStockLegend"></div>
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">New Stock by District <span class="count" id="newStockTotal"></span></div>
        <div class="section-body perf-chart-body">

          <div class="perf-legend" id="newStockLegend"></div>
        </div>
      </div>
    </div>
  `;
  renderStockChart("existing", "#8B1C43");
  renderStockChart("new", "#B48A2E");
}
function renderStockChart(mapKey, color){
  const items = collectStockByDistrict(mapKey);
  const total = items.reduce((s,i) => s + i.value, 0);
  const totalEl = $(mapKey === "existing" ? "#existingStockTotal" : "#newStockTotal");
  const pieWrap = $(mapKey === "existing" ? "#existingStockPieWrap" : "#newStockPieWrap");
  const legendEl = $(mapKey === "existing" ? "#existingStockLegend" : "#newStockLegend");

  totalEl.textContent = total > 0 ? formatFullNum(total) : "";
  const pie = buildDonutSvg(items, 200, color);
  pieWrap.innerHTML = pie
    ? pie + `<div class="donut-center"><div class="donut-total">${formatFullNum(total)}</div><div class="donut-sub">Total</div></div>`
    : `<div class="pie-empty">No data entered yet</div>`;

  legendEl.innerHTML = items.length === 0
    ? `<div class="empty-hint">Add a project with a stock value to see it here.</div>`
    : items.map(it => `
      <div class="legend-row">
        <span class="dot" style="background:${color}"></span>
        <span class="legend-name">${escapeHtml(it.label)}</span>
        <span class="legend-value">${formatFullNum(it.value)}</span>
        <span class="legend-pct">${total > 0 ? Math.round(it.value / total * 100) + "%" : ""}</span>
      </div>`).join("");
}

/* ---------------- Tabs ---------------- */
function setTab(tab){
  state.activeTab = tab;
  $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  $("#dashboardView").classList.toggle("hidden", tab !== "dashboard");
  $("#performanceView").classList.toggle("hidden", tab !== "performance");
  if(tab === "performance") renderPerformance();
  if(tab === "dashboard") renderMaps();
}

/* ---------------- Fullscreen / presentation mode ---------------- */
function initFullscreen(){
  const btn = $("#fullscreenBtn");
  btn.addEventListener("click", () => {
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
    else { document.exitFullscreen().catch(()=>{}); }
  });
  document.addEventListener("fullscreenchange", () => {
    document.body.classList.toggle("presentation", !!document.fullscreenElement);
    btn.textContent = document.fullscreenElement ? "\u2715 Exit" : "\u26f6 Present";
  });
}

/* ---------------- Utils ---------------- */
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---------------- Init ---------------- */
function init(){
  STORAGE_OK = storageAvailable();
  setSaveIndicator(STORAGE_OK ? "ok" : "blocked");
  if(STORAGE_OK) loadState();

  renderMaps();
  initGlobalSearch();
  initFullscreen();

  $$(".tab").forEach(t => t.addEventListener("click", () => setTab(t.dataset.tab)));

  document.addEventListener("click", closeAllStatusDropdowns);
  document.addEventListener("keydown", e => {
    if(e.key === "Escape"){
      closeAllStatusDropdowns();
      if(state.openDistrict) closeDistrictModal();
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
})();

</script>
